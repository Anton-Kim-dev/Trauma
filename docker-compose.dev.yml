services:
  auth-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${AUTH_SERVICE_DB}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
      - ./database/auth_service/definition.sql:/docker-entrypoint-initdb.d/init.sql

  users-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${USERS_SERVICE_DB}
    volumes:
      - users-db-data:/var/lib/postgresql/data
      - ./database/user_service/definition.sql:/docker-entrypoint-initdb.d/init.sql

  appointments-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${APPOINTMENTS_SERVICE_DB}
    volumes:
      - appointments-db-data:/var/lib/postgresql/data
      - ./database/appointment_service/definition.sql:/docker-entrypoint-initdb.d/init.sql

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: npm run dev -w apps/backend
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    environment:
      NODE_ENV: development
      SERVICE: auth
      PORT: 3101
      DB_HOST: auth-db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      AUTH_SERVICE_DB: ${AUTH_SERVICE_DB}
      USERS_SERVICE_URL: http://users-service:3102
      JWT_VER: ${JWT_VER}
      JWT_EXP: ${JWT_EXP}
      JWT_REFRESH_EXP: ${JWT_REFRESH_EXP}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SALT: ${JWT_REFRESH_SALT}
    depends_on:
      - auth-db
      - users-service
    ports:
      - "3101:3101"

  users-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: npm run dev -w apps/backend
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    environment:
      NODE_ENV: development
      SERVICE: users
      PORT: 3102
      DB_HOST: users-db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      USERS_SERVICE_DB: ${USERS_SERVICE_DB}
      JWT_VER: ${JWT_VER}
      JWT_EXP: ${JWT_EXP}
      JWT_REFRESH_EXP: ${JWT_REFRESH_EXP}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SALT: ${JWT_REFRESH_SALT}
    depends_on:
      - users-db
    ports:
      - "3102:3102"

  appointments-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: npm run dev -w apps/backend
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    environment:
      NODE_ENV: development
      SERVICE: appointments
      PORT: 3103
      DB_HOST: appointments-db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      APPOINTMENTS_SERVICE_DB: ${APPOINTMENTS_SERVICE_DB}
      USERS_SERVICE_URL: http://users-service:3102/users
      JWT_VER: ${JWT_VER}
      JWT_EXP: ${JWT_EXP}
      JWT_REFRESH_EXP: ${JWT_REFRESH_EXP}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SALT: ${JWT_REFRESH_SALT}
    depends_on:
      - appointments-db
    ports:
      - "3103:3103"

  docs-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: npm run dev -w apps/backend
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    environment:
      NODE_ENV: development
      SERVICE: docs
      PORT: 3100
      PROXY_URL: http://localhost:8080
    ports:
      - "3104:3100"

  host:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: npm run dev:host
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      VITE_API_URL: /api
      DASHBOARD_URL: /dashboard
      MEDICAL_URL: /medical
    ports:
      - "3000:3000"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: npm run dev:dashboard
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      VITE_API_URL: /api
    ports:
      - "3001:3001"

  medical:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: npm run dev:medical
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      VITE_API_URL: /api
    ports:
      - "3002:3002"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf
    depends_on:
      - host
      - dashboard
      - medical
      - auth-service
      - users-service
      - appointments-service
      - docs-service

volumes:
  auth-db-data:
  users-db-data:
  appointments-db-data:
  workspace-node-modules:
