services:
  auth-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${AUTH_SERVICE_DB}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
      - ./database/auth_service/definition.sql:/docker-entrypoint-initdb.d/init.sql

  users-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${USERS_SERVICE_DB}
    volumes:
      - users-db-data:/var/lib/postgresql/data
      - ./database/user_service/definition.sql:/docker-entrypoint-initdb.d/init.sql

  appointments-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${APPOINTMENTS_SERVICE_DB}
    volumes:
      - appointments-db-data:/var/lib/postgresql/data
      - ./database/appointment_service/definition.sql:/docker-entrypoint-initdb.d/init.sql

  auth-service:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        SERVICE: auth
    environment:
      NODE_ENV: production
      PORT: 3101
      DB_HOST: auth-db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      AUTH_SERVICE_DB: ${AUTH_SERVICE_DB}
      USERS_SERVICE_URL: http://users-service:3102
      JWT_VER: ${JWT_VER}
      JWT_EXP: ${JWT_EXP}
      JWT_REFRESH_EXP: ${JWT_REFRESH_EXP}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SALT: ${JWT_REFRESH_SALT}
    depends_on:
      - auth-db
      - users-service
    ports:
      - "3101:3101"

  users-service:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        SERVICE: users
    environment:
      NODE_ENV: production
      PORT: 3102
      DB_HOST: users-db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      USERS_SERVICE_DB: ${USERS_SERVICE_DB}
      JWT_VER: ${JWT_VER}
      JWT_EXP: ${JWT_EXP}
      JWT_REFRESH_EXP: ${JWT_REFRESH_EXP}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SALT: ${JWT_REFRESH_SALT}
    depends_on:
      - users-db
    ports:
      - "3102:3102"

  appointments-service:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        SERVICE: appointments
    environment:
      NODE_ENV: production
      PORT: 3103
      DB_HOST: appointments-db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      APPOINTMENTS_SERVICE_DB: ${APPOINTMENTS_SERVICE_DB}
      USERS_SERVICE_URL: http://users-service:3102/users
      JWT_VER: ${JWT_VER}
      JWT_EXP: ${JWT_EXP}
      JWT_REFRESH_EXP: ${JWT_REFRESH_EXP}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SALT: ${JWT_REFRESH_SALT}
    depends_on:
      - appointments-db
    ports:
      - "3103:3103"

  docs-service:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        SERVICE: docs
    environment:
      NODE_ENV: production
      PORT: 3100
      PROXY_URL: http://localhost:8080
    ports:
      - "3004:3100"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: /api
        DASHBOARD_URL: /dashboard
        MEDICAL_URL: /medical
    volumes:
      - frontend-build:/usr/share/nginx/html

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - frontend-build:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - auth-service
      - users-service
      - appointments-service
      - docs-service

volumes:
  auth-db-data:
  users-db-data:
  appointments-db-data:
  frontend-build:
