events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://host:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dashboard/ {
            proxy_pass http://dashboard:3001/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        location /medical/ {
            proxy_pass http://medical:3002/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        location /docs/ {
            proxy_pass http://docs-service:3100;
        }

        location /api/auth/ {
            rewrite ^/api/auth/(.*) /auth/$1 break;
            proxy_pass http://auth-service:3101;
        }

        location /api/users/ {
            rewrite ^/api/users/(.*) /users/$1 break;
            proxy_pass http://users-service:3102;
        }

        location /api/appointments/ {
            rewrite ^/api/appointments/(.*) /appointments/$1 break;
            proxy_pass http://appointments-service:3103;
        }

        location /swagger/auth {
            proxy_pass http://auth-service:3101/swagger.json;
        }

        location /swagger/users {
            proxy_pass http://users-service:3102/swagger.json;
        }

        location /swagger/appointments {
            proxy_pass http://appointments-service:3103/swagger.json;
        }
    }
}
